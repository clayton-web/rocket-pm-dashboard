# Twice-daily Daily Briefing scheduler (external cron).
#
# UTC times below match America/Vancouver during PDT (UTC-7):
#   07:00 local = 14:00 UTC (MORNING)
#   14:00 local = 21:00 UTC (AFTERNOON)
# During PST (UTC-8), shift cron to 15:00 / 22:00 UTC unless made timezone-aware later.
#
# Vercel cron (vercel.json, 0 6 * * * UTC) remains a once-daily safety-net job drain only;
# it does not enqueue briefings. This workflow enqueues and drains the twice-daily pipeline.
name: Daily Briefing cron

on:
  schedule:
    - cron: "0 14 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: Briefing slot to schedule
        required: true
        default: MORNING
        type: choice
        options:
          - MORNING
          - AFTERNOON
      dry_run:
        description: Dry run only (no jobs enqueued, no queue drain)
        required: true
        default: false
        type: boolean

concurrency:
  group: daily-briefing-cron
  cancel-in-progress: false

env:
  APP_BASE_URL: https://www.rocketlogic.ca

jobs:
  schedule-and-drain:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve briefing slot and dry-run mode
        id: config
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ inputs.slot }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 14 * * *" ]; then
            echo "slot=MORNING" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "slot=AFTERNOON" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enqueue briefing schedule
        env:
          JOB_PROCESSOR_SECRET: ${{ secrets.JOB_PROCESSOR_SECRET }}
        run: |
          set -euo pipefail
          SLOT="${{ steps.config.outputs.slot }}"
          DRY_RUN="${{ steps.config.outputs.dry_run }}"
          BASE="${APP_BASE_URL}/dashboard/api/internal/briefing/schedule"

          if [ "$DRY_RUN" = "true" ]; then
            URL="${BASE}?slot=${SLOT}&dryRun=true"
          else
            URL="${BASE}?slot=${SLOT}"
          fi

          echo "POST ${URL}"
          HTTP_CODE=$(curl -sS -o /tmp/schedule-response.json -w "%{http_code}" \
            -X POST "$URL" \
            -H "Authorization: Bearer ${JOB_PROCESSOR_SECRET}")

          echo "HTTP status: ${HTTP_CODE}"
          echo "Response body:"
          cat /tmp/schedule-response.json
          echo ""

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Schedule request failed."
            exit 1
          fi

      - name: Drain job queue (initial)
        if: steps.config.outputs.dry_run != 'true'
        env:
          JOB_PROCESSOR_SECRET: ${{ secrets.JOB_PROCESSOR_SECRET }}
        run: |
          set -euo pipefail
          PROCESS_URL="${APP_BASE_URL}/dashboard/api/internal/jobs/process"

          echo "POST ${PROCESS_URL}"
          HTTP_CODE=$(curl -sS -o /tmp/process-response-1.json -w "%{http_code}" \
            -X POST "$PROCESS_URL" \
            -H "Authorization: Bearer ${JOB_PROCESSOR_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"limit":10}')

          echo "HTTP status: ${HTTP_CODE}"
          echo "Response body:"
          cat /tmp/process-response-1.json
          echo ""

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Initial job processor request failed."
            exit 1
          fi

      - name: Wait for delayed briefing.generate after Gmail sync
        if: steps.config.outputs.dry_run != 'true'
        run: |
          echo "Waiting 360 seconds for briefing.generate jobs scheduled after gmail.sync..."
          sleep 360

      - name: Drain job queue (post-delay)
        if: steps.config.outputs.dry_run != 'true'
        env:
          JOB_PROCESSOR_SECRET: ${{ secrets.JOB_PROCESSOR_SECRET }}
        run: |
          set -euo pipefail
          PROCESS_URL="${APP_BASE_URL}/dashboard/api/internal/jobs/process"

          echo "POST ${PROCESS_URL}"
          HTTP_CODE=$(curl -sS -o /tmp/process-response-2.json -w "%{http_code}" \
            -X POST "$PROCESS_URL" \
            -H "Authorization: Bearer ${JOB_PROCESSOR_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"limit":10}')

          echo "HTTP status: ${HTTP_CODE}"
          echo "Response body:"
          cat /tmp/process-response-2.json
          echo ""

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Post-delay job processor request failed."
            exit 1
          fi
